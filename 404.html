<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Письмо от тайного друга</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💌</text></svg>" />
    <script>
      (function() {
        var segment = location.pathname.replace(/^\/tayniy-drug/, '') || '/';
        sessionStorage.setItem('redirect', segment);
      })();
    </script>
  </head>
  <body>
    <script>location.replace('/tayniy-drug/');</script>
  </body>
</html>
